user www-data;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

# Brotli (installed via `nginx-mod-http-brotli` Alpine package). Must be loaded
# at the main (not http) context. Paths follow Alpine's module layout.
load_module /usr/lib/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /usr/lib/nginx/modules/ngx_http_brotli_static_module.so;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    client_max_body_size 20M;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';
    access_log /dev/stdout main;

    # Transfer compression — prefer pre-compressed files produced by Vite build
    # (`gzip_static`/`brotli_static`). Fall back to on-the-fly compression for
    # dynamic responses (Livewire/PHP routes).
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    brotli on;
    brotli_static on;
    brotli_comp_level 5;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;
        root /app/public;
        index index.php;

        # Laravel front controller
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
            fastcgi_read_timeout 300;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 16 128k;
            fastcgi_busy_buffers_size 256k;
        }

        # Deny access to hidden files and sensitive paths
        location ~ /\.(?!well-known).* {
            deny all;
        }

        location ~* \.(env|log|git)$ {
            deny all;
        }

        # Static asset caching — fall through to Laravel for dynamic routes
        # (e.g. Livewire serves /livewire/livewire.js via a route, not a file)
        location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri /index.php?$query_string;
        }
    }
}
