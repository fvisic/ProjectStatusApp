# Local development overrides — picked up automatically by `docker compose`.
# Production: use `docker compose -f docker-compose.yml up -d` to skip this file.
services:
  app:
    volumes:
      - ./app:/app/app
      - ./resources/views:/app/resources/views
      - ./lang:/app/lang
      - ./config:/app/config
      - ./routes:/app/routes
      - ./database:/app/database
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/zz-dev.ini
